<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/index.js"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <main class="mx-auto max-w-lg px-4 py-10">
      <form
        id="app"
        class="flex max-h-[calc(100dvh-5rem)] flex-col rounded-2xl bg-white p-6 shadow-lg ring-1 ring-slate-200"
      >
        <header class="mb-6">
          <p class="text-sm font-medium uppercase tracking-wide text-indigo-600">Flow Sample</p>
          <h1 class="mt-1 text-3xl font-bold text-slate-900">Todo App</h1>
          <p class="mt-2 text-sm text-slate-500">Tailwind をビルドして dist に含めています。</p>
        </header>

        <div class="flex gap-2">
          <input
            type="text"
            id="input"
            placeholder="やることを入力"
            class="min-w-0 flex-1 rounded-xl border border-slate-300 px-4 py-2.5 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
          />
          <button
            type="submit"
            id="add"
            class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-300"
          >
            追加
          </button>
        </div>

        <div class="mt-4 flex items-center justify-between">
          <p id="count" class="text-sm text-slate-500">0 件</p>
          <button
            type="button"
            id="clear"
            class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-sm font-medium text-rose-700 transition hover:bg-rose-100 hover:text-rose-800"
          >
            すべて削除
          </button>
        </div>

        <div id="list-scroll" class="mt-4 min-h-0 flex-1 overflow-y-auto pr-1">
          <ul id="list" class="space-y-2"></ul>
        </div>
      </form>
    </main>

    <template id="todo-item-template">
      <li
        data-todo-item
        class="flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700"
      >
        <input
          type="checkbox"
          data-todo-check
          class="h-4 w-4 shrink-0 rounded border-slate-300 text-indigo-600 focus:ring-indigo-200"
        />
        <span class="flex-1" data-todo-text></span>
      </li>
    </template>

    <dialog
      id="confirm-dialog"
      class="m-auto w-[calc(100%-2rem)] max-w-sm rounded-2xl border-0 bg-white p-6 shadow-xl ring-1 ring-slate-200"
    >
      <form method="dialog" class="space-y-4">
        <div>
          <h2 class="text-lg font-semibold text-slate-900">確認</h2>
          <p id="confirm-message" class="mt-2 text-sm text-slate-600"></p>
        </div>
        <div class="flex justify-end gap-2">
          <button
            type="submit"
            value="cancel"
            class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100"
          >
            キャンセル
          </button>
          <button
            type="submit"
            value="confirm"
            class="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-500"
          >
            削除
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
